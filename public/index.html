<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hood News</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Newspaper Flash Intro -->
  <div id="newspaperFlash">
    <div class="flash-panel">
      <h1>HOOD NEWS</h1>
      <p>Breaking Stories Loading...</p>
    </div>
  </div>

  <header>
    <h1>HOOD NEWS</h1>
    <p class="tagline">Real news from real neighborhoods</p>
  </header>

  <section id="controls">
    <select id="citySelect"></select>
    <select id="zoneSelect"></select>
  </section>

  <main>
    <section class="block" id="articlesBlock">
      <h2>Articles</h2>
      <div class="list" id="articlesList"></div>
    </section>

    <section class="block" id="jobsBlock">
      <h2>Jobs</h2>
      <div class="list" id="jobsList"></div>
    </section>

    <section class="block" id="eventsBlock">
      <h2>Events</h2>
      <div class="list" id="eventsList"></div>
    </section>

    <section class="block" id="resourcesBlock">
      <h2>Resources</h2>
      <div class="list" id="resourcesList"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
