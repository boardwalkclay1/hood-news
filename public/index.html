<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hood News</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Newspaper Flash Intro -->
  <div id="newspaperFlash">
    <div class="flash-panel">
      <h1>HOOD NEWS</h1>
      <p>Breaking Stories Loading...</p>
    </div>
  </div>

  <!-- Top Bar + Ticker -->
  <header>
    <div class="brand-row">
      <div class="brand">
        <span class="brand-tag">HN</span>
        <div>
          <h1>Hood News</h1>
          <p class="tagline">Real news from real neighborhoods</p>
        </div>
      </div>
      <div class="controls">
        <select id="citySelect"></select>
        <select id="zoneSelect"></select>
      </div>
    </div>

    <div class="ticker">
      <div class="ticker-label">Breaking</div>
      <div class="ticker-track">
        <div class="ticker-content" id="tickerContent">
          Loading latest headlines...
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="block" id="articlesBlock">
      <div class="block-header">
        <h2>Articles</h2>
        <div class="page-flip"></div>
      </div>
      <div class="list" id="articlesList"></div>
    </section>

    <section class="block" id="jobsBlock">
      <div class="block-header">
        <h2>Jobs</h2>
        <div class="page-flip"></div>
      </div>
      <div class="list" id="jobsList"></div>
    </section>

    <section class="block" id="eventsBlock">
      <div class="block-header">
        <h2>Events</h2>
        <div class="page-flip"></div>
      </div>
      <div class="list" id="eventsList"></div>
    </section>

    <section class="block" id="resourcesBlock">
      <div class="block-header">
        <h2>Resources</h2>
        <div class="page-flip"></div>
      </div>
      <div class="list" id="resourcesList"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
