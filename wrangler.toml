name = "hood-news"
main = "src/worker.js"
compatibility_date = "2024-04-20"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "hoodnews"
database_id = "YOUR_DB_ID_HERE"

# Queues
[[queues.producers]]
queue = "SCRAPE_QUEUE"
binding = "SCRAPE_QUEUE"

[[queues.producers]]
queue = "NORMALIZE_QUEUE"
binding = "NORMALIZE_QUEUE"

[[queues.consumers]]
queue = "SCRAPE_QUEUE"

[[queues.consumers]]
queue = "NORMALIZE_QUEUE"

# Cron
[triggers]
crons = ["*/15 * * * *"]
