name = "hood-news"
main = "src/worker.js"
compatibility_date = "2024-04-20"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "hoodnews"
database_id = "YOUR_DB_ID_HERE"

# ============================
# QUEUES (VALID CONFIG)
# ============================

# Producers (Workers can SEND to these queues)
[[queues.producers]]
queue = "scrape-queue"
binding = "SCRAPE_QUEUE"

[[queues.producers]]
queue = "normalize-queue"
binding = "NORMALIZE_QUEUE"

# Consumers (Workers RECEIVE from these queues)
# ❗ NO BINDING ALLOWED HERE
[[queues.consumers]]
queue = "scrape-queue"

[[queues.consumers]]
queue = "normalize-queue"

# Cron schedule
[triggers]
crons = ["*/15 * * * *"]
